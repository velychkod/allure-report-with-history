name: 'Allure Report with History'
description: 'Generate and deploy Allure report with history to a GitHub branch'
author: 'Dmytro Velychko'
runs:
  using: 'node16'
  main: 'src/index.js'
inputs:
  allure-results-source:
    description: 'Path to allure-results files or artifact'
    required: true
  published-reports-branch:
    description: 'Branch to store Allure reports and history'
    required: true
  reports-to-keep:
    description: 'How many reports to keep; 0 = overwrite branch'
    required: false
    default: '20'
  generate-index-html-with-reports-history:
    description: 'Generate index.html listing all reports'
    required: false
    default: 'true'
  gh-pages-url:
    description: 'Optional URL to GitHub Pages to link the report in run summary'
    required: false