name: "Allure Report with History"
description: "Generate and deploy Allure reports with history to GitHub Pages or a custom branch."
author: "Your Name"
branding:
  icon: "bar-chart-2"
  color: "purple"

inputs:
  allure-results-source:
    description: "Path to the directory containing allure-results"
    required: true
  published-reports-branch:
    description: "Branch where reports will be published (e.g., gh-pages)"
    required: true
  reports-to-keep:
    description: "Number of old reports to keep in history (0 to overwrite)"
    required: false
    default: "20"
  generate-index-html-with-reports-history:
    description: "Generate index.html with links to past reports"
    required: false
    default: "true"
  gh-pages-url:
    description: "URL of GitHub Pages site where the reports will be hosted"
    required: false

runs:
  using: "node20"
  main: "dist/index.js"
