name: 'Allure Report With History'
description: 'Generate and deploy Allure reports with history for GitHub Actions.'
author: 'velychkod'
runs:
  using: 'node16'
  main: 'dist/index.js'
inputs:
  allure-results-source:
    description: 'Path or artifact where allure-results are located'
    required: true
  published-reports-branch:
    description: 'Branch to deploy the report and history'
    required: true
  reports-to-keep:
    description: 'Number of reports to keep. If 0, overwrite the branch.'
    required: false
    default: '20'
  generate-index-html-with-reports-history:
    description: 'Whether to generate index.html with report history'
    required: false
    default: 'true'
  gh-pages-url:
    description: 'Optional URL to the GitHub Pages site to link the report in run summary'
    required: false