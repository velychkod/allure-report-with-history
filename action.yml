name: 'Allure Report with History'
description: 'Generate and publish Allure reports with history support, keeping previous reports and generating an index page.'
author: 'Dmytro Velychko'
branding:
  icon: 'bar-chart-2'
  color: 'blue'

inputs:
  allure-results-source:
    description: 'Path to the folder containing allure-results or the artifact name to download.'
    required: true
  published-reports-branch:
    description: 'Branch where Allure reports will be published (e.g., gh-pages or allure-reports).'
    required: true
  reports-to-keep:
    description: 'Number of past reports to keep. Use 0 to overwrite the branch with the latest report only.'
    required: false
    default: '20'
  generate-index-html-with-reports-history:
    description: 'Whether to generate index.html linking to all historical reports.'
    required: false
    default: 'true'
  gh-pages-url:
    description: 'Base GitHub Pages URL where the reports will be accessible.'
    required: false

runs:
  using: 'node20'
  main: 'dist/index.js'